<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Orbitron:wght@700;800&display=swap" rel="stylesheet">

<style>
  html {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(circle at 18% -12%, rgba(44, 201, 232, 0.28), transparent 36%),
      radial-gradient(circle at 84% 18%, rgba(16, 132, 168, 0.2), transparent 34%),
      linear-gradient(180deg, #05111a 0%, #03080e 100%);
  }

  :root {
    --bg: #03080e;
    --panel: #08151f;
    --panel-soft: #0d1f2d;
    --stroke: rgba(90, 210, 235, 0.24);
    --text: #ffffff;
    --muted: #93aabd;
    --accent: #39cbea;
    --accent-2: #1f89b3;
  }

  * {
    box-sizing: border-box;
  }

  body {
    width: 100%;
    min-width: 320px;
    margin: 0;
    padding: 0;
    font-family: "Manrope", "Segoe UI", Arial, sans-serif;
    text-align: center;
    background:
      radial-gradient(circle at 18% -12%, rgba(44, 201, 232, 0.28), transparent 36%),
      radial-gradient(circle at 84% 18%, rgba(16, 132, 168, 0.2), transparent 34%),
      linear-gradient(180deg, #05111a 0%, #03080e 100%);
    color: var(--text);
    overflow: hidden;
  }

  .app-shell {
    border-radius: 18px;
    padding: 10px;
    margin: 0;
    background: linear-gradient(180deg, rgba(9, 20, 30, 0.98), rgba(4, 12, 20, 0.99));
    border: 1px solid rgba(80, 199, 230, 0.22);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
  }

  #mainBox {
    min-height: 140px;
    max-height: 210px;
    overflow-y: auto;
    background:
      radial-gradient(circle at 78% 18%, rgba(59, 200, 235, 0.24), transparent 38%),
      linear-gradient(180deg, rgba(6, 16, 25, 0.98), rgba(4, 11, 18, 0.97));
    border: 1px solid rgba(88, 196, 226, 0.26);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    padding: 12px;
    transition: all 0.24s ease;
  }

  #timerUI {
    display: none;
    width: 100%;
    box-sizing: border-box;
    flex: 0 0 auto;
    text-align: left;
  }

  #notesView {
    display: none;
    width: 100%;
    text-align: left;
    flex: 1 1 auto;
    min-height: 0;
    overflow: visible;
    padding: 2px;
    box-sizing: border-box;
  }

  #notesView::-webkit-scrollbar {
    width: 0;
  }

  #mainBox::-webkit-scrollbar {
    width: 8px;
  }

  #mainBox::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 8px;
  }

  *::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 8px;
  }

  .notes-header {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 2px 2px 10px;
    color: var(--text);
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.3px;
    text-align: center;
  }

  .notes-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .note-card {
    border-radius: 12px;
    padding: 10px;
    min-height: 70px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(95, 196, 226, 0.26);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 4px;
    color: #ffffff;
    background: #0f4a68;
  }

  .note-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .note-title {
    margin: 0;
    font-size: 14px;
    line-height: 1.2;
    color: #ffffff;
    font-weight: 800;
    word-break: break-word;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
  }

  .note-bullet {
    display: inline-block;
    width: 8px;
    height: 8px;
    margin-right: 6px;
    background: #000000;
    border-radius: 50%;
    vertical-align: middle;
  }

  .note-actions {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    margin: 0;
  }

  .open-note-btn {
    color: #ffffff;
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
  }

  .open-note-btn:hover {
    text-decoration: underline;
  }

  .delete-note-btn {
    cursor: pointer;
    font-size: 14px;
    color: #9ee9ff;
    transition: transform 0.15s ease;
  }

  .notes-empty {
    margin: 8px 0 2px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }

  .notes-loading {
    padding: 20px 8px;
    color: var(--muted);
    text-align: center;
    font-size: 14px;
  }

  h4 {
    margin: 4px 0 10px;
    font-size: 16px;
    color: #ffffff;
    letter-spacing: 0.35px;
    text-align: left;
  }

  input {
    width: 100%;
    padding: 11px 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid rgba(90, 198, 228, 0.28);
    outline: none;
    font-size: 14px;
    transition: 0.22s;
    background: rgba(8, 24, 36, 0.88);
    color: #ffffff;
  }

  input::placeholder {
    color: #8fb2c6;
  }

  input:focus {
    border-color: rgba(93, 210, 242, 0.72);
    box-shadow: 0 0 0 3px rgba(64, 196, 235, 0.2);
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    opacity: 1;
    filter: invert(78%) sepia(39%) saturate(523%) hue-rotate(152deg) brightness(104%) contrast(97%);
  }

  #startBtn {
    margin-top: 12px;
    width: 100%;
    padding: 10px 16px;
    background: linear-gradient(135deg, #3ccbe8, #1f88b0);
    color: #ffffff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    transition: 0.22s;
  }

  #startBtn:hover {
    transform: translateY(-1px);
    opacity: 0.98;
  }

  #countdown {
    font-size: 30px;
    font-weight: 800;
    margin-top: 12px;
    color: #94ecff;
    text-align: center;
  }

  .button-row {
    display: flex;
    gap: 10px;
    width: 100%;
    margin: 0;
  }

  .orbital {
    width: 100%;
    padding: 11px;
    background: linear-gradient(180deg, rgba(12, 26, 38, 0.82), rgba(7, 17, 28, 0.88));
    border: 1px solid rgba(86, 201, 232, 0.3);
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    color: #ffffff;
    transition: all 0.18s cubic-bezier(0.2, 0.8, 0.3, 1);
    display: inline-flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.25px;
    margin: 3px 0;
  }

  .orbital:hover {
    transform: translateY(-2px);
    border-color: rgba(115, 225, 252, 0.78);
    background: linear-gradient(180deg, rgba(16, 34, 49, 0.92), rgba(9, 22, 35, 0.92));
    box-shadow: 0 6px 16px rgba(72, 204, 238, 0.22);
    opacity: 1;
  }

  .orbital:active,
  .orbital.is-active {
    background: linear-gradient(90deg, #3ac7e3, #1c7da2);
    color: #ffffff;
    border-color: rgba(112, 228, 255, 0.82);
    font-weight: 800;
    box-shadow: 0 4px 12px rgba(64, 201, 236, 0.32);
  }

  .orbital:disabled {
    background: linear-gradient(180deg, rgba(9, 18, 28, 0.6), rgba(6, 13, 20, 0.6)) !important;
    color: #66859a !important;
    border-color: rgba(88, 191, 220, 0.14) !important;
    cursor: not-allowed !important;
    opacity: 0.5 !important;
    box-shadow: none !important;
  }

  .orbital:disabled:hover {
    transform: none !important;
    border-color: rgba(88, 191, 220, 0.14) !important;
  }

  .orbital.icon-grid {
    min-height: 58px;
    flex-direction: column;
    gap: 3px;
  }

  .btn-emoji {
    font-size: 18px;
    line-height: 1;
  }

  .btn-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 800;
  }

  .orbit-brand {
    font-family: "Orbitron", "Manrope", sans-serif;
    font-weight: 900;
    color: #000000;
    font-size: 32px;
    letter-spacing: 1.8px;
    display: inline-block;
    text-align: center;
    text-shadow:
      0 0 8px rgba(94, 224, 255, 0.5),
      0 0 20px rgba(26, 154, 194, 0.36);
  }

  .orbit-white {
    color: #ffffff !important;
  }

  .orbit-tagline {
    margin-top: 2px;
    font-size: 12px;
    color: #c8f1ff;
    opacity: 0.88;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .orbit-animate {
    will-change: transform, opacity;
    animation: orbitPop 850ms cubic-bezier(.2,.9,.3,1) both;
  }

  @keyframes orbitPop {
    0% {
      transform: scale(0.72) translateY(4px);
      opacity: 0;
    }
    60% {
      transform: scale(1.06) translateY(-2px);
      opacity: 1;
    }
    100% {
      transform: scale(1) translateY(0);
      opacity: 1;
    }
  }

  .orbit-letters span {
    display: inline-block;
    transform-origin: center;
  }

  #emptyView {
    flex: 1 1 auto;
    min-height: 0;
    transition: opacity 220ms ease, visibility 220ms;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #emptyView.empty-visible {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  .hero-shell {
    width: 100%;
    min-height: 96px;
    border-radius: 12px;
    border: 1px solid rgba(90, 198, 228, 0.42);
    background:
      radial-gradient(ellipse 280% 200% at 65% 15%, rgba(39, 185, 224, 0.52), transparent 45%),
      radial-gradient(circle at 35% 50%, rgba(84, 223, 255, 0.2), transparent 42%),
      linear-gradient(135deg, rgba(4, 17, 31, 0.96), rgba(5, 23, 37, 0.94));
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
    animation: slideUp 0.42s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 360px) {
    body {
      width: 300px;
    }

    .notes-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

</head>

<body>

<div class="app-shell">

<div id="mainBox">

  <!-- TIMER UI -->
  <div id="timerUI">
    <h4>⏱ Set Timer</h4>

    <input id="time" type="number" placeholder="Minutes">
    <input id="customMessage" type="text" placeholder="Message (optional)">

    <button id="startBtn">Start</button>

    <div id="countdown"></div>
  </div>

  <!-- NOTES VIEW -->
  <div id="notesView"></div>

  <!-- EMPTY / BRAND VIEW -->
  <div id="emptyView" style="width:100%; flex: 1;">
    <div class="hero-shell">
      <div style="text-align:center; width:100%;">
        <div class="orbit-brand" aria-hidden="true"><strong>O R B I T</strong></div>
        <div class="orbit-tagline">Stay in your ORBIT</div>
      </div>
    </div>
  </div>

</div>

<div class="controls">
  <div class="button-row">
    <button id="toggleDark" class="orbital" style="flex:1;">🔆 Dark Mode</button>
    <button id="bottomBtn" class="orbital" style="flex:1;">⏳ Set Timer</button>
  </div>

  <div class="button-row">
    <button id="showNotes" class="orbital" style="flex:1;">📒 Show Notes</button>
    <button id="analyzeVideo" class="orbital" style="flex:1;">🧠 Video Analyzer</button>
  </div>

  <div class="button-row">
    <button id="generatePDF" class="orbital" style="flex:1;">📄 Generate PDF</button>
    <button id="clearSnaps" class="orbital" style="flex:1;">🧹 Clear PDF Stack</button>
  </div>

  <button id="toggleRecommend" class="orbital">🙈 Hide Recommendations</button>
  <button id="toggleComments" class="orbital">Hide Comments</button>
</div>

<script src="popup.js"></script>

</body>
</html>
