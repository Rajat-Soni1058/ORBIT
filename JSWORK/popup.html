<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Orbitron:wght@700;800&display=swap" rel="stylesheet">

<style>
  html {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(circle at 18% -12%, rgba(35, 85, 188, 0.35), transparent 36%),
      radial-gradient(circle at 84% 18%, rgba(18, 182, 215, 0.24), transparent 34%),
      linear-gradient(180deg, #070d1f 0%, #040812 100%);
  }

  :root {
    --bg: #050915;
    --panel: #080f22;
    --panel-soft: #0b1430;
    --stroke: rgba(130, 157, 204, 0.22);
    --text: #dbe8ff;
    --muted: #96a8cb;
    --accent: #12b6d7;
    --accent-2: #1f77ff;
  }

  * {
    box-sizing: border-box;
  }

  body {
    width: 100%;
    min-width: 320px;
    margin: 0;
    padding: 0;
    font-family: "Manrope", "Segoe UI", Arial, sans-serif;
    text-align: center;
    background:
      radial-gradient(circle at 18% -12%, rgba(35, 85, 188, 0.35), transparent 36%),
      radial-gradient(circle at 84% 18%, rgba(18, 182, 215, 0.24), transparent 34%),
      linear-gradient(180deg, #070d1f 0%, #040812 100%);
    color: var(--text);
    overflow: hidden;
  }

  .app-shell {
    border-radius: 22px;
    padding: 12px;
    margin: 0;
    background: linear-gradient(180deg, rgba(10, 18, 42, 0.94), rgba(5, 10, 24, 0.96));
    border: 1px solid rgba(123, 153, 206, 0.18);
    box-shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
  }

  #mainBox {
    min-height: 196px;
    max-height: 250px;
    overflow-y: auto;
    background:
      radial-gradient(circle at 78% 18%, rgba(38, 157, 255, 0.24), transparent 36%),
      linear-gradient(180deg, rgba(7, 15, 36, 0.97), rgba(5, 11, 26, 0.96));
    border: 1px solid var(--stroke);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    padding: 14px;
    transition: all 0.28s ease;
  }

  #timerUI {
    display: none;
    width: 100%;
    box-sizing: border-box;
    flex: 0 0 auto;
    text-align: left;
  }

  #notesView {
    display: none;
    width: 100%;
    text-align: left;
    flex: 1 1 auto;
    min-height: 0;
    overflow: visible;
    padding: 2px;
    box-sizing: border-box;
  }

  #notesView::-webkit-scrollbar {
    width: 0;
  }

  #mainBox::-webkit-scrollbar {
    width: 8px;
  }

  #mainBox::-webkit-scrollbar-thumb {
    background: rgba(140, 168, 217, 0.36);
    border-radius: 8px;
  }

  .notes-header {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 2px 2px 10px;
    color: var(--text);
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.3px;
    text-align: center;
  }

  .notes-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .note-card {
    border-radius: 12px;
    padding: 10px;
    min-height: 70px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(138, 168, 221, 0.2);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 4px;
    color: #08203d;
  }

  .note-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .note-title {
    margin: 0;
    font-size: 14px;
    line-height: 1.2;
    color: #0a223d;
    font-weight: 800;
    word-break: break-word;
  }

  .note-bullet {
    display: inline-block;
    width: 8px;
    height: 8px;
    margin-right: 6px;
    background: #072142;
    border-radius: 50%;
    vertical-align: middle;
  }

  .note-actions {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    margin: 0;
  }

  .open-note-btn {
    color: #0d2f56;
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
  }

  .open-note-btn:hover {
    text-decoration: underline;
  }

  .delete-note-btn {
    cursor: pointer;
    font-size: 14px;
    color: #b42318;
    transition: transform 0.15s ease;
  }

  .notes-empty {
    margin: 8px 0 2px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }

  .notes-loading {
    padding: 20px 8px;
    color: var(--muted);
    text-align: center;
    font-size: 14px;
  }

  h4 {
    margin: 4px 0 10px;
    font-size: 16px;
    color: #b8ceff;
    letter-spacing: 0.35px;
    text-align: left;
  }

  input {
    width: 100%;
    padding: 11px 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid rgba(143, 168, 214, 0.24);
    outline: none;
    font-size: 14px;
    transition: 0.22s;
    background: rgba(8, 18, 42, 0.88);
    color: #d9e8ff;
  }

  input::placeholder {
    color: #8ba1c8;
  }

  input:focus {
    border-color: rgba(43, 185, 255, 0.7);
    box-shadow: 0 0 0 3px rgba(41, 161, 255, 0.16);
  }

  #startBtn {
    margin-top: 12px;
    width: 100%;
    padding: 10px 16px;
    background: linear-gradient(135deg, #18b7d7, #1f6ffd);
    color: #f4faff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    transition: 0.22s;
  }

  #startBtn:hover {
    transform: translateY(-1px);
    opacity: 0.98;
  }

  #countdown {
    font-size: 30px;
    font-weight: 800;
    margin-top: 12px;
    color: #d6ecff;
    text-align: center;
  }

  .button-row {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: 8px;
    margin-bottom: 4px;
  }

  .orbital {
    width: 100%;
    padding: 12px;
    background: linear-gradient(180deg, #0a1230, #070d25);
    border: none;
    border-radius: 14px;
    border: 1px solid rgba(128, 157, 211, 0.24);
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    color: #cde4ff;
    transition: transform 0.22s ease, opacity 0.22s ease, border-color 0.22s ease;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.2px;
    margin: 4px 0;
  }

  .orbital:hover {
    transform: translateY(-1px);
    border-color: rgba(108, 219, 255, 0.56);
    opacity: 0.99;
  }

  .orbital:active,
  .orbital.is-active {
    background: linear-gradient(90deg, #17b4d8, #0f9cc0);
    color: #03131c;
    border-color: transparent;
    font-weight: 800;
  }

  .orbital.icon-grid {
    min-height: 64px;
    flex-direction: column;
    gap: 4px;
  }

  .btn-emoji {
    font-size: 16px;
    line-height: 1;
  }

  .btn-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .orbit-brand {
    font-family: "Orbitron", "Manrope", sans-serif;
    font-weight: 800;
    color: #f2f8ff;
    font-size: 40px;
    letter-spacing: 1.5px;
    display: inline-block;
    text-align: center;
    text-shadow:
      0 0 12px rgba(104, 183, 255, 0.32),
      0 0 28px rgba(9, 108, 224, 0.2);
  }

  .orbit-white {
    color: #ffffff !important;
  }

  .orbit-tagline {
    margin-top: 4px;
    font-size: 14px;
    color: #c9dbff;
    opacity: 0.9;
    font-weight: 500;
  }

  .orbit-animate {
    will-change: transform, opacity;
    animation: orbitPop 850ms cubic-bezier(.2,.9,.3,1) both;
  }

  @keyframes orbitPop {
    0% {
      transform: scale(0.72) translateY(4px);
      opacity: 0;
    }
    60% {
      transform: scale(1.06) translateY(-2px);
      opacity: 1;
    }
    100% {
      transform: scale(1) translateY(0);
      opacity: 1;
    }
  }

  .orbit-letters span {
    display: inline-block;
    transform-origin: center;
  }

  #emptyView {
    flex: 1 1 auto;
    min-height: 0;
    transition: opacity 220ms ease, visibility 220ms;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #emptyView.empty-visible {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  .hero-shell {
    width: 100%;
    min-height: 156px;
    border-radius: 10px;
    border: 1px solid rgba(130, 160, 212, 0.26);
    background:
      radial-gradient(circle at 75% 22%, rgba(23, 148, 255, 0.4), transparent 30%),
      radial-gradient(circle at 42% 40%, rgba(41, 186, 255, 0.17), transparent 38%),
      linear-gradient(145deg, rgba(4, 9, 24, 0.94), rgba(8, 15, 32, 0.92));
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }

  @media (max-width: 360px) {
    body {
      width: 300px;
    }

    .notes-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

</head>

<body>

<div class="app-shell">

<div id="mainBox">

  <!-- TIMER UI -->
  <div id="timerUI">
    <h4>⏱ Set Timer</h4>

    <input id="time" type="number" placeholder="Minutes">
    <input id="customMessage" type="text" placeholder="Message (optional)">

    <button id="startBtn">Start</button>

    <div id="countdown"></div>
  </div>

  <!-- NOTES VIEW -->
  <div id="notesView"></div>

  <!-- EMPTY / BRAND VIEW -->
  <div id="emptyView" style="width:100%; height:220px;">
    <div class="hero-shell">
      <div style="text-align:center; width:100%;">
        <div class="orbit-brand" aria-hidden="true"><strong>ORBIT</strong></div>
        <div class="orbit-tagline">Watch smarter, not distracted</div>
      </div>
    </div>
  </div>

</div>

<div class="button-row">
  <button id="toggleDark" class="orbital icon-grid" style="flex:1;">
    <span class="btn-emoji">🌓</span>
    <span class="btn-label">Mode</span>
  </button>

  <button id="bottomBtn" class="orbital icon-grid" style="flex:1;">
    <span class="btn-emoji">🕔</span>
    <span class="btn-label">Timer</span>
  </button>
</div>

<button id="toggleRecommend" class="orbital">Hide Recommendations</button>
<button id="toggleComments" class="orbital">Hide Comments</button>

<button id="showNotes" class="orbital">📔 Show Notes</button>

<div class="button-row">
  <button id="analyzeVideo" class="orbital" style="flex:1;">🔍 Video Analyzer</button>
</div>

</div>

<script src="popup.js"></script>

</body>
</html>
